# Build APK for Manual Trigger

name: Build APK (Manual)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2

    - name: Make Gradlew executable
      run: chmod +x gradlew

    - name: Clean Build
      run: ./gradlew clean

    - name: Build APK
      run: ./gradlew assembleDebug

    - name: Create Output Directory
      run: mkdir -p apk_build

    - name: Copy APK
      run: |
        cp app/build/outputs/apk/debug/app-debug.apk apk_build/app-debug.apk
        ls -la apk_build/

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: podcast-player-debug
        path: apk_build/app-debug.apk
        retention-days: 7
