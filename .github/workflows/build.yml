name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Download and Setup Gradle 8.5
      run: |
        wget https://services.gradle.org/distributions/gradle-8.5-bin.zip
        unzip gradle-8.5-bin.zip
        export PATH=./gradle-8.5/bin:$PATH
        gradle --version

    - name: Generate Gradle Wrapper
      run: |
        export PATH=./gradle-8.5/bin:$PATH
        cd /home/runner/work/podcast-player/podcast-player
        gradle wrapper

    - name: Build APK
      run: |
        ./gradlew assembleDebug --info || {
          echo "Build failed, listing build directory:"
          ls -la app/build/
          echo "Trying with root gradle..."
          export PATH=./gradle-8.5/bin:$PATH
          gradle assembleDebug
        }

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: podcast-player-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
