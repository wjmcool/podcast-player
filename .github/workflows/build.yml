name: Build APK

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Add Gradle Wrapper
      run: |
        cd ${{ github.workspace }}
        mkdir -p gradle/wrapper
        wget -q https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradle/wrapper/gradle-wrapper.jar -O gradle/wrapper/gradle-wrapper.jar
        wget -q https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradlew -O gradlew
        wget -q https://raw.githubusercontent.com/gradle/gradle/v8.5.0/gradlew.bat -O gradlew.bat
        chmod +x gradlew
      
    - name: Build APK
      run: |
        export PATH=./gradle-8.5/bin:$PATH
        wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
        unzip -q gradle-8.5-bin.zip
        export PATH=$PWD/gradle-8.5/bin:$PATH
        ./gradlew assembleDebug --info || ./gradle-8.5/bin/gradle assembleDebug
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: podcast-player-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
