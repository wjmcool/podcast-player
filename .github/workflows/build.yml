# Podcast Player CI/CD Pipeline
# Automatically builds APK on branch push

name: Build APK

on:
  push:
    branches: [ "podcast_qwen" ]
  pull_request:
    branches: [ "podcast_qwen" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Give execute permission to gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Create download directory
      run: |
        mkdir -p apk_download
        cp app/build/outputs/apk/debug/app-debug.apk apk_download/app-debug.apk
      
    - name: Upload APK artifact
      uses: actions/upload-artifact@v3
      with:
        name: podcast-player-apk
        path: apk_download/app-debug.apk

    - name: Download APK to artifact
      run: |
        wget -O /sdcard/OpenClaw/podcast-player-debug.apk \
          "https://github.com/wjmcool/podcast-player/actions/runs/${{ github.run_id }}/artifacts/${{ job.artifactId }}"
      continue-on-error: true

    - name: Print success message
      run: echo "APK built and ready to download!"
