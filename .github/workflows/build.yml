name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Verify gradlew exists
      run: |
        echo "Checking gradlew file..."
        if [ -f "gradlew" ]; then
            echo "gradlew exists!"
            ls -la gradlew
            file gradlew
        else
            echo "ERROR: gradlew not found!"
            ls -la
            exit 1
        fi

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: List all files
      run: |
        echo "=== All files in project root ==="
        ls -la
        echo ""
        echo "=== gradle directory ==="
        ls -la gradle/
        echo ""
        echo "=== gradle/wrapper directory ==="
        ls -la gradle/wrapper/
        echo ""
        echo "=== app directory ==="
        ls -la app/

    - name: Build APK
      run: |
        echo "Starting build..."
        ./gradlew clean assembleDebug --stacktrace
        echo "Build completed!"
        echo "Checking for APK files..."
        find . -name "*.apk" -type f

    - name: Find APK files
      run: find . -name "*.apk" -type f -ls

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: podcast-player-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
        if-no-files-found: error
