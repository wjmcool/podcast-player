name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Make Gradlew executable
      run: chmod +x gradlew

    - name: Build APK
      shell: bash
      run: |
        echo "Starting build..."
        ./gradlew assembleDebug --stacktrace || true
        echo "Build completed"

    - name: Check APK
      run: |
        if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            echo "APK found!"
            mkdir -p output
            cp app/build/outputs/apk/debug/app-debug.apk output/app-debug.apk
            ls -la output/
        else
            echo "APK not found, listing outputs:"
            find app/build -name "*.apk" 2>/dev/null
        fi

    - name: Upload APK
      if: success() || failure()
      uses: actions/upload-artifact@v4
      with:
        name: podcast-player-debug
        path: output/app-debug.apk
        retention-days: 7
