name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Clean GitHub Actions Cache
      run: |
        echo "Cleaning all caches..."
        rm -rf ${{ github.workspace }}/.gradle
        rm -rf ${{ github.workspace }}/node_modules
        rm -rf $HOME/.gradle/caches
      
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        clean: true
        fetch-depth: 0

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v4
      with:
        gradle-version: '8.5'
        cache-read-only: false

    - name: Build APK
      run: |
        ./gradlew assembleDebug --no-daemon --info

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: podcast-player-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
