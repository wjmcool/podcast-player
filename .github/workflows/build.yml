name: Build APK

on:
  push:
    branches:
      - podcast_minimax-m2.7
  pull_request:
    branches:
      - podcast_minimax-m2.7

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 8.4

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon -p app 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: podcast-app
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 5
