# Podcast Player CI/CD Pipeline
# Automatically builds APK on branch push

name: Build APK

on:
  push:
    branches: [ "podcast_qwen" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Give execute permission to gradlew
      run: chmod +x gradlew

    - name: Clean build
      run: ./gradlew clean

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Create APK directory
      run: mkdir -p apk_artifacts

    - name: Copy APK to artifact directory
      run: |
        cp app/build/outputs/apk/debug/app-debug.apk apk_artifacts/app-debug.apk
        ls -la apk_artifacts/

    - name: Upload APK artifact
      uses: actions/upload-artifact@v3
      with:
        name: podcast-player-debug
        path: apk_artifacts/app-debug.apk
        retention-days: 7
