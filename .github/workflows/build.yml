name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Download Gradle 8.5
      run: |
        wget https://services.gradle.org/distributions/gradle-8.5-bin.zip
        unzip -q gradle-8.5-bin.zip
        export PATH=$PWD/gradle-8.5/bin:$PATH
        
    - name: Setup Gradle Wrapper
      run: |
        export PATH=$PWD/gradle-8.5/bin:$PATH
        
        # Navigate to project
        cd ${{ github.workspace }}
        
        # Generate wrapper if not exists
        gradle wrapper --gradle-version=8.5
        
        # List generated files
        ls -la gradlew gradle/wrapper/

    - name: Build APK
      run: |
        cd ${{ github.workspace }}
        chmod +x gradlew
        export PATH=$PWD/gradle-8.5/bin:$PATH
        
        # Show project structure
        echo "=== Project Structure ==="
        ls -la
        ls -la app/src/main/
        
        # Build
        echo "=== Starting Build ==="
        ./gradlew assembleDebug -X
        
    - name: Find APK
      run: |
        cd ${{ github.workspace }}
        find . -type f -name "*.apk" -exec ls -la {} \;
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: podcast-player-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
