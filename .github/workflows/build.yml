name: Build Podcast APK

on:
  push:
    branches: [ podcast_step-3.5-flash, main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v2
        with:
          api-level: 34
          build-tools: '34.0.0'

      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace --info

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: podcast-player-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
