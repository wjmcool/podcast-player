name: Build APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Make app/gradlew executable
        run: chmod +x app/gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace || ./gradlew assembleDebug

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace || ./gradlew assembleRelease

      - name: Upload Debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: podcast-player-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: podcast-player-release
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Create Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' && success()
        uses: softprops/action-gh-release@v1
        with:
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}