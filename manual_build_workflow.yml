---
name: Build APK
description: Build the APK file for Podcast Player
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Make Gradlew executable
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Copy APK
      run: |
        mkdir -p apk_output
        cp app/build/outputs/apk/debug/app-debug.apk apk_output/app-debug.apk

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: podcast-player-debug
        path: apk_output/app-debug.apk
